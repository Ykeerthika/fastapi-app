<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI + PostgreSQL Stack Dashboard</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
    <div class="max-w-xl mx-auto bg-gray-800 p-6 rounded-lg shadow-xl">
        <h1 class="text-3xl font-bold mb-6 text-center text-emerald-400">PostgreSQL Entry Dashboard</h1>
        
        <!-- Form to Add Items -->
        <div class="mb-6 flex gap-2">
            <input type="text" id="itemTitle" placeholder="Enter new database row..." class="bg-gray-700 text-white flex-1 p-2 rounded focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="addItem()" class="bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold px-4 py-2 rounded transition">Commit Row</button>
        </div>

        <!-- Task List Container -->
        <ul id="itemList" class="space-y-2">
            <!-- Items injected dynamically -->
        </ul>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function fetchItems() {
            try {
                const res = await fetch(`${API_BASE}/api/items`);
                const items = await res.json();
                const list = document.getElementById('itemList');
                list.innerHTML = '';
                
                items.forEach(item => {
                    list.innerHTML += `
                        <li class="flex items-center justify-between bg-gray-700 p-3 rounded border-l-4 border-emerald-500">
                            <span class="text-white">${item.title}</span>
                            <button onclick="deleteItem(${item.id})" class="text-red-400 hover:text-red-500 font-semibold px-2 py-1 rounded">Wipe</button>
                        </li>
                    `;
                });
            } catch (err) { console.error("Database Fetch Error:", err); }
        }

        async function addItem() {
            const input = document.getElementById('itemTitle');
            if (!input.value.trim()) return;
            
            await fetch(`${API_BASE}/api/items`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value, completed: false })
            });
            input.value = '';
            fetchItems();
        }

        async function deleteItem(id) {
            await fetch(`${API_BASE}/api/items/${id}`, { method: 'DELETE' });
            fetchItems();
        }

        window.onload = fetchItems;
    </script>
</body>
</html>
