<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FastAPI CSP Test</title>
</head>
<body>
    <h1>FastAPI CSP Test Dashboard</h1>
    <p>Open your browser console (Press F12) to observe the CSP block.</p>

    <script>
        console.log("Checking policy...");

        // ❌ This triggers your exact error: string evaluation is blocked by FastAPI's CSP header
        try {
            setTimeout("console.log('If you see this, CSP is NOT blocking strings.')", 500);
        } catch (e) {
            console.log("Execution blocked by browser mechanism.");
        }

        // ✅ This functions seamlessly because it uses an arrow function instead of an arbitrary string
        setTimeout(() => {
            console.log("Safe code path executed successfully.");
        }, 1000);
    </script>
</body>
</html>
